[env:xiao_esp32c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.6.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Bring-up stage gate (see docs/bring-up.md):
    ;   1 = rails + UI, 2 = HV open-loop, 3 = HV closed-loop,
    ;   4 = GM detection, 5 = full application.
    ; Lower stages physically block the HV path. Start at 1 on a fresh board
    ; and raise this only after the previous stage has passed.
    -DBRINGUP_STAGE=1
